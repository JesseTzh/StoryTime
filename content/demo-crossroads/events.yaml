- id: event_rules_received
  name: 三条雾灯规则
  type: world_state_event
  participantIds:
    - npc_guide
  trigger:
    fact: facts.guide_briefed
    equals: true
  description: 守灯人的话被驿站记下：晨时不看镜中脸，正午不踩第十三根影，夜里不回应雾中的名字。
  effects:
    - type: change_variable
      key: rule_integrity
      delta: 5
  followupEventIds: []
- id: event_morning_salt_taken
  name: 晨镜盐入手
  type: location_event
  locationId: loc_crossroads
  participantIds:
    - npc_guide
  trigger:
    fact: facts.ritual_morning_done
    equals: true
  description: 铜镜背面渗出白盐，像一圈没有瞳孔的眼睛，在你移开目光后慢慢干裂。
  effects:
    - type: change_variable
      key: fog_pressure
      delta: -5
  followupEventIds: []
- id: event_noon_shadow_bound
  name: 正午影线缠定
  type: location_event
  locationId: loc_crossroads
  participantIds:
    - npc_guide
  trigger:
    fact: facts.ritual_noon_done
    equals: true
  description: 第十三根影线被缠住时，路口尽头有一条从未存在过的岔路无声合拢。
  effects:
    - type: change_variable
      key: rule_integrity
      delta: 5
  followupEventIds: []
- id: event_night_wick_sealed
  name: 夜灰灯芯入手
  type: location_event
  locationId: loc_crossroads
  participantIds:
    - npc_guide
  trigger:
    fact: facts.ritual_night_done
    equals: true
  description: 夜灰灯芯被拈起时，雾里所有声音都改成了你的嗓音，随后又像被门关在外面。
  effects:
    - type: change_variable
      key: fog_pressure
      delta: -10
  followupEventIds: []
- id: event_shen_plan_succeeded
  name: 沈灯计谋得逞
  type: world_state_event
  participantIds:
    - npc_guide
  trigger:
    all:
      - fact: time.day
        greater_than_or_equal: 2
      - fact: facts.guide_briefed
        equals: true
      - fact: facts.lamp_materials_delivered
        exists: false
      - fact: facts.shen_plan_succeeded
        exists: false
  description: 第一夜已经过去，三件封灯物没有交到沈灯手中。门口木牌上的旧名字被雾泡软，只等新的名字刻上去。
  effects:
    - type: add_fact
      key: shen_plan_succeeded
      value: true
    - type: change_variable
      key: fog_pressure
      delta: 20
    - type: change_variable
      key: rule_integrity
      delta: -20
  followupEventIds: []
- id: event_keeper_replaced
  name: 新守灯人
  type: world_state_event
  participantIds:
    - npc_guide
  trigger:
    all:
      - fact: time.day
        greater_than_or_equal: 2
      - fact: time.segment
        equals: night
      - fact: facts.lamp_lit
        exists: false
      - fact: facts.player_became_keeper
        exists: false
  description: 第二天夜里，雾灯仍未亮起。旧守灯人的身影被雾擦掉，灯室门后只剩你的影子。
  effects:
    - type: fail_quest
      questId: quest_prepare_lamp_rite
    - type: fail_quest
      questId: quest_light_fog_lamp
    - type: add_fact
      key: player_became_keeper
      value: true
    - type: change_player_attribute
      attribute: reputation
      delta: -5
    - type: trigger_ending
      endingId: ending_new_lamp_keeper
  followupEventIds: []
