- id: quest_prepare_lamp_rite
  title: 遵守三段雾灯规则
  description: 守灯人要求你在第一天早晨、正午、夜晚分别完成三项雾灯规则，凑齐封灯匣。
  sourceNpcId: npc_guide
  conditions:
    fact: facts.guide_briefed
    equals: true
  objectives:
    - id: objective_rules_received
      title: 与守灯人确认三条规则
      description: 开局先听完守灯人说明，知道早、中、晚各自不能违背的动作。
      conditions:
        fact: facts.guide_briefed
        equals: true
    - id: objective_morning_mirror
      title: 早晨完成晨时擦镜
      description: 在第一天早晨取得晨镜盐。
      conditions:
        fact: facts.ritual_morning_done
        equals: true
    - id: objective_noon_shadow
      title: 正午完成正午定影
      description: 在第一天正午取得正午影线。
      conditions:
        fact: facts.ritual_noon_done
        equals: true
    - id: objective_night_wick
      title: 夜晚完成夜里封芯
      description: 在第一天夜晚取得夜灰灯芯和封灯匣。
      conditions:
        fact: facts.ritual_night_done
        equals: true
  completion:
    type: environment
    environmentType: search
    targetType: building
    targetId: building_lamp_room
    interactionId: interaction_night_wick
  rewardIds:
    - reward_rite_prepared
- id: quest_deliver_lamp_box
  title: 次日交付封灯匣
  description: 第二天再次与守灯人确认封灯物，并把封灯匣交给他。
  sourceNpcId: npc_guide
  conditions:
    fact: facts.sealed_lamp_box_ready
    equals: true
  objectives:
    - id: objective_return_next_day
      title: 第二天回到守灯人身边
      description: 必须等到第二天，雾才会承认封灯匣仍属于人间。
      conditions:
        fact: time.day
        greater_than_or_equal: 2
    - id: objective_deliver_box
      title: 交付封灯匣
      description: 把封灯匣交给守灯人。
      conditions:
        fact: facts.lamp_box_delivered
        equals: true
  completion:
    type: give
    npcId: npc_guide
    itemId: item_sealed_lamp_box
    itemCount: 1
    interactionId: interaction_deliver_lamp_box
  rewardIds:
    - reward_lamp_box_accepted
- id: quest_light_fog_lamp
  title: 点亮雾灯离开驿站
  description: 守灯人验过封灯匣后，点亮雾灯才能离开驿站。
  sourceNpcId: npc_guide
  conditions:
    fact: quests.quest_deliver_lamp_box.status
    equals: completed
  objectives:
    - id: objective_light_lamp
      title: 点亮雾灯
      description: 在第二天夜幕降临前完成最后点灯。
      conditions:
        fact: facts.lamp_lit
        equals: true
  completion:
    type: environment
    environmentType: search
    targetType: building
    targetId: building_lamp_room
    interactionId: interaction_light_fog_lamp
  rewardIds:
    - reward_station_left
