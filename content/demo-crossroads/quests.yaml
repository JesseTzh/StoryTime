- id: quest_prepare_lamp_rite
  title: 第一夜交付三件封灯物
  description: 依照沈灯的指引，在第一天早晨、正午、夜晚分别取得晨镜盐、正午影线和夜灰灯芯，并在第一天夜里交给沈灯。
  sourceNpcId: npc_guide
  conditions:
    fact: facts.guide_briefed
    equals: true
  objectives:
    - id: objective_rules_received
      title: 问清离开的办法
      description: 开局先听完沈灯说明，知道雾灯需要哪些封灯物才能重新亮起。
      conditions:
        fact: facts.guide_briefed
        equals: true
    - id: objective_morning_mirror
      title: 取得晨镜盐
      description: 在第一天早晨背灯擦镜，取得晨镜盐。
      conditions:
        fact: facts.ritual_morning_done
        equals: true
    - id: objective_noon_shadow
      title: 取得正午影线
      description: 在第一天正午量定灯架影线，取得正午影线。
      conditions:
        fact: facts.ritual_noon_done
        equals: true
    - id: objective_night_wick
      title: 取得夜灰灯芯
      description: 在第一天夜晚从旧灯芯灰里取出夜灰灯芯。
      conditions:
        fact: facts.ritual_night_done
        equals: true
    - id: objective_offer_materials
      title: 第一夜交给沈灯
      description: 必须在第一天夜里把三件封灯物交给沈灯。
      conditions:
        fact: facts.lamp_materials_delivered
        equals: true
  completion:
    type: conversation
    npcId: npc_guide
    conversationId: conversation_lamp_offering
    replyId: reply_offer_lamp_materials
  rewardIds:
    - reward_rite_prepared
- id: quest_light_fog_lamp
  title: 第二天由沈灯开启雾灯
  description: 第一夜交付三件封灯物后，第二天再与沈灯对话，让他为你开启雾灯。
  sourceNpcId: npc_guide
  conditions:
    fact: facts.lamp_materials_delivered
    equals: true
  objectives:
    - id: objective_return_next_day
      title: 第二天回到沈灯身边
      description: 沈灯需要等到第二天确认雾灯认路，才会替你开灯。
      conditions:
        fact: time.day
        greater_than_or_equal: 2
    - id: objective_lamp_opened
      title: 沈灯开启雾灯
      description: 与沈灯确认三件封灯物已经入火，等待雾灯亮起。
      conditions:
        fact: facts.lamp_lit
        equals: true
  completion:
    type: conversation
    npcId: npc_guide
    conversationId: conversation_second_day_lamp_opening
    replyId: reply_accept_lamp_opening
  rewardIds:
    - reward_station_left
