- id: conversation_keeper_rules
  npcId: npc_guide
  title: 询问如何离开此处
  entryNodeId: node_entry
  priority: 20
  conditions:
    fact: facts.guide_briefed
    exists: false
  nodes:
    - id: node_entry
      speaker: npc_guide
      text: 进了驿站就别急着走。雾已经记住你的脚步，只有雾灯亮起，它才会承认你不是这里的人。
      replies:
        - id: reply_ask_rules
          text: 我该怎么离开这里？
          nextNodeId: node_leave_hint
        - id: reply_refuse_rules
          text: 我不信这些。
          endConversation: true
    - id: node_leave_hint
      speaker: npc_guide
      text: 路不在雾里，在灯里。你若真想离开，就照我说的做；差一步，雾都会替你记着。
      replies:
        - id: reply_ask_how
          text: 好，我可以。具体该怎么做？
          nextNodeId: node_rules
    - id: node_rules
      speaker: npc_guide
      text: 第一，晨时擦镜，不看镜里多出来的脸。第二，正午定影，不踩第十三根影线。第三，夜里封芯，听见自己的名字也不要应。三样都拿到以后，必须在今夜交到我手里。
      replies:
        - id: reply_accept_rules
          text: 我照你说的做。
          endConversation: true
          effects:
            - type: add_fact
              key: guide_briefed
              value: true
            - type: start_quest
              questId: quest_prepare_lamp_rite
            - type: change_relationship
              source: player
              target: npc_guide
              path: trust
              delta: 5
- id: conversation_prepare_lamp_reminder
  npcId: npc_guide
  title: 三件封灯物之前
  entryNodeId: node_prepare_lamp_reminder
  priority: 15
  conditions:
    all:
      - fact: facts.guide_briefed
        equals: true
      - fact: time.day
        equals: 1
      - fact: facts.lamp_materials_delivered
        exists: false
  nodes:
    - id: node_prepare_lamp_reminder
      speaker: npc_guide
      text: 离开的办法已经告诉你了。晨镜盐、正午影线、夜灰灯芯，三样都要在今夜交给我。过了今夜，雾就不认你的手了。
      replies:
        - id: reply_prepare_lamp_ack
          text: 我会在夜里带齐三件东西回来。
          endConversation: true
- id: conversation_lamp_offering
  npcId: npc_guide
  title: 第一夜交付封灯物
  entryNodeId: node_lamp_offering
  priority: 40
  conditions:
    all:
      - fact: time.day
        equals: 1
      - fact: time.segment
        equals: night
      - fact: facts.lamp_materials_delivered
        exists: false
      - fact: player.inventory.item_mirror_salt
        greater_than_or_equal: 1
      - fact: player.inventory.item_shadow_thread
        greater_than_or_equal: 1
      - fact: player.inventory.item_ashen_wick
        greater_than_or_equal: 1
  nodes:
    - id: node_lamp_offering
      speaker: npc_guide
      text: 你竟然按时带齐了。把盐、影线和灯芯放到灯盏前，不要多问，也不要让雾听见你松气。
      replies:
        - id: reply_offer_lamp_materials
          text: 我把三件封灯物交给你。
          endConversation: true
          effects:
            - type: remove_item
              itemId: item_mirror_salt
              count: 1
            - type: remove_item
              itemId: item_shadow_thread
              count: 1
            - type: remove_item
              itemId: item_ashen_wick
              count: 1
            - type: add_fact
              key: lamp_materials_delivered
              value: true
            - type: add_fact
              key: handoff_confirmed
              value: true
            - type: change_relationship
              source: player
              target: npc_guide
              path: trust
              delta: 15
- id: conversation_morning_rite_failed
  npcId: npc_guide
  title: 晨镜盐已失
  entryNodeId: node_morning_failed
  priority: 35
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.ritual_morning_failed
        equals: true
      - fact: facts.lamp_materials_delivered
        exists: false
  nodes:
    - id: node_morning_failed
      speaker: npc_guide
      text: 你擦镜的时候，晨雾已经退过一层了。那点盐只认第一缕冷光，错过之后，镜面记下的就不是你的影子。
      replies:
        - id: reply_morning_failed_ack
          text: 所以晨镜盐已经取不到了？
          endConversation: true
- id: conversation_noon_rite_failed
  npcId: npc_guide
  title: 正午影线已乱
  entryNodeId: node_noon_failed
  priority: 34
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.ritual_noon_failed
        equals: true
      - fact: facts.lamp_materials_delivered
        exists: false
  nodes:
    - id: node_noon_failed
      speaker: npc_guide
      text: 影线只在正午肯站直。你动手时它已经斜了，带回来的不是路影，是雾影；这样的线，封不住灯。
      replies:
        - id: reply_noon_failed_ack
          text: 正午影线已经不能用了。
          endConversation: true
- id: conversation_night_rite_failed
  npcId: npc_guide
  title: 夜灰灯芯已冷
  entryNodeId: node_night_failed
  priority: 33
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.ritual_night_failed
        equals: true
      - fact: facts.lamp_materials_delivered
        exists: false
  nodes:
    - id: node_night_failed
      speaker: npc_guide
      text: 夜里取芯，听的是雾先开口，还是人先伸手。你错了时辰，灰里剩下的只是冷渣，不会再替雾灯认路。
      replies:
        - id: reply_night_failed_ack
          text: 夜灰灯芯已经失效了。
          endConversation: true
- id: conversation_second_day_lamp_opening
  npcId: npc_guide
  title: 沈灯开灯
  entryNodeId: node_lamp_opening
  priority: 45
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.lamp_materials_delivered
        equals: true
      - fact: facts.lamp_lit
        exists: false
  nodes:
    - id: node_lamp_opening
      speaker: npc_guide
      text: 谢谢你按时回来。盐记住了你的影子，影线绑住了路，灯芯还认人的气息。现在我替你开灯，雾会放你走。
      replies:
        - id: reply_accept_lamp_opening
          text: 请为我开启雾灯。
          endConversation: true
          effects:
            - type: add_fact
              key: lamp_lit
              value: true
            - type: add_fact
              key: station_left
              value: true
            - type: change_variable
              key: lamp_readiness
              delta: 20
            - type: change_variable
              key: fog_pressure
              delta: -35
- id: conversation_shen_plan_revealed
  npcId: npc_guide
  title: 沈灯的计谋
  entryNodeId: node_plan_revealed
  priority: 50
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.shen_plan_succeeded
        equals: true
      - fact: facts.player_became_keeper
        exists: false
  nodes:
    - id: node_plan_revealed
      speaker: npc_guide
      text: 你没有在昨夜把三件东西交给我。雾只要一个守灯人，我等这一夜已经等了很久。现在木牌会记你的名字，而我的脚步终于能离开门槛。
      replies:
        - id: reply_accept_keeper_fate
          text: 原来这才是你的办法。
          endConversation: true
          effects:
            - type: fail_quest
              questId: quest_prepare_lamp_rite
            - type: fail_quest
              questId: quest_light_fog_lamp
            - type: add_fact
              key: player_became_keeper
              value: true
            - type: change_player_attribute
              attribute: reputation
              delta: -5
            - type: trigger_ending
              endingId: ending_new_lamp_keeper
- id: conversation_lamp_lit
  npcId: npc_guide
  title: 离站之前
  entryNodeId: node_lamp_lit
  priority: 10
  conditions:
    fact: facts.lamp_lit
    equals: true
  nodes:
    - id: node_lamp_lit
      speaker: npc_guide
      text: 路开了。出去后别回头，别数脚步，别答应雾里任何一个叫你送信的人。
      replies:
        - id: reply_leave_station
          text: 我记住了。
          endConversation: true
