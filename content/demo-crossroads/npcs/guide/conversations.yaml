- id: conversation_keeper_rules
  npcId: npc_guide
  title: 询问如何离开此处
  entryNodeId: node_entry
  priority: 20
  conditions:
    fact: facts.guide_briefed
    exists: false
  nodes:
    - id: node_entry
      speaker: npc_guide
      text: 进了驿站就别急着走。雾已经记住你的脚步，只有雾灯亮起，它才会承认你不是这里的人。
      replies:
        - id: reply_ask_rules
          text: 我该怎么离开这里？
          nextNodeId: node_leave_hint
        - id: reply_refuse_rules
          text: 我不信这些。
          endConversation: true
    - id: node_leave_hint
      speaker: npc_guide
      text: 路不在雾里，在灯里。你若真想离开，就照我说的做；差一步，雾都会替你记着。
      replies:
        - id: reply_ask_how
          text: 好，我可以。具体该怎么做？
          nextNodeId: node_rules
    - id: node_rules
      speaker: npc_guide
      text: 第一，晨时擦镜，不看镜里多出来的脸。第二，正午定影，不踩第十三根影线。第三，夜里封芯，听见自己的名字也不要应。三样都做完，封灯匣会自己合上。
      replies:
        - id: reply_accept_rules
          text: 我照你说的做。
          endConversation: true
          effects:
            - type: add_fact
              key: guide_briefed
              value: true
            - type: start_quest
              questId: quest_prepare_lamp_rite
            - type: change_relationship
              source: player
              target: npc_guide
              path: trust
              delta: 5
- id: conversation_prepare_lamp_reminder
  npcId: npc_guide
  title: 封灯匣之前
  entryNodeId: node_prepare_lamp_reminder
  priority: 15
  conditions:
    all:
      - fact: facts.guide_briefed
        equals: true
      - fact: time.day
        equals: 1
      - fact: facts.sealed_lamp_box_ready
        exists: false
  nodes:
    - id: node_prepare_lamp_reminder
      speaker: npc_guide
      text: 离开的办法已经告诉你了。先把三件封灯物收齐，等封灯匣自己合上，明天再拿来找我。路不会提前认人，雾也不会。
      replies:
        - id: reply_prepare_lamp_ack
          text: 我会带着封灯匣回来。
          endConversation: true
- id: conversation_morning_rite_failed
  npcId: npc_guide
  title: 晨镜盐已失
  entryNodeId: node_morning_failed
  priority: 35
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.ritual_morning_failed
        equals: true
  nodes:
    - id: node_morning_failed
      speaker: npc_guide
      text: 你擦镜的时候，晨雾已经退过一层了。那点盐只认第一缕冷光，错过之后，镜面记下的就不是你的影子。
      replies:
        - id: reply_morning_failed_ack
          text: 所以晨镜盐已经取不到了？
          endConversation: true
- id: conversation_noon_rite_failed
  npcId: npc_guide
  title: 正午影线已乱
  entryNodeId: node_noon_failed
  priority: 34
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.ritual_noon_failed
        equals: true
  nodes:
    - id: node_noon_failed
      speaker: npc_guide
      text: 影线只在正午肯站直。你动手时它已经斜了，缠进铜扣里的不是路影，是雾影；这样的线，封不住灯。
      replies:
        - id: reply_noon_failed_ack
          text: 正午影线已经不能用了。
          endConversation: true
- id: conversation_night_rite_failed
  npcId: npc_guide
  title: 夜灰灯芯已冷
  entryNodeId: node_night_failed
  priority: 33
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.ritual_night_failed
        equals: true
  nodes:
    - id: node_night_failed
      speaker: npc_guide
      text: 夜里取芯，听的是雾先开口，还是人先伸手。你错了时辰，灰里剩下的只是冷渣，不会再替雾灯认路。
      replies:
        - id: reply_night_failed_ack
          text: 夜灰灯芯已经失效了。
          endConversation: true
- id: conversation_lamp_box_handoff
  npcId: npc_guide
  title: 交付前确认
  entryNodeId: node_handoff
  priority: 30
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: facts.sealed_lamp_box_ready
        equals: true
      - fact: facts.lamp_box_delivered
        exists: false
  nodes:
    - id: node_handoff
      speaker: npc_guide
      text: 你带回来了。别打开匣子，只把它递给我。若里面少了任意一样，雾会用你的影子补上。
      replies:
        - id: reply_deliver_lamp_box
          text: 我把封灯匣交给你。
          itemCost:
            itemId: item_sealed_lamp_box
            itemCount: 1
          endConversation: true
          effects:
            - type: add_fact
              key: lamp_box_delivered
              value: true
            - type: add_fact
              key: handoff_confirmed
              value: true
            - type: change_relationship
              source: player
              target: npc_guide
              path: trust
              delta: 15
- id: conversation_after_delivery
  npcId: npc_guide
  title: 最后一盏灯
  entryNodeId: node_after_delivery
  priority: 25
  conditions:
    all:
      - fact: quests.quest_deliver_lamp_box.status
        equals: completed
      - fact: facts.lamp_lit
        exists: false
  nodes:
    - id: node_after_delivery
      speaker: npc_guide
      text: 灯芯认得你了。现在去点灯，别等到夜里。夜一到，驿站要的就不是灯油，而是守灯人。
      replies:
        - id: reply_go_light_lamp
          text: 我现在去点亮雾灯。
          endConversation: true
- id: conversation_lamp_lit
  npcId: npc_guide
  title: 离站之前
  entryNodeId: node_lamp_lit
  priority: 10
  conditions:
    fact: facts.lamp_lit
    equals: true
  nodes:
    - id: node_lamp_lit
      speaker: npc_guide
      text: 路开了。出去后别回头，别数脚步，别答应雾里任何一个叫你送信的人。
      replies:
        - id: reply_leave_station
          text: 我记住了。
          endConversation: true
