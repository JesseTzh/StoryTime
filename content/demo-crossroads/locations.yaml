- id: loc_crossroads
  name: 雾灯路口
  type: roadside
  tags:
    - crossroads
    - fog_rule
    - lamp_rite
  state:
    is_accessible: true
    discovered: true
  descriptions:
    default: 旧路在这里分成两岔，木杆上的雾灯垂着冷光，像一只尚未睁开的眼。
    morning: 晨雾贴着地面，灯室门槛外有三道不属于人的脚印，天亮后仍没有散。
    noon: 日头悬在雾后，灯架的影子比实际木杆多出一根，正好指向小屋门缝。
    night: 夜色压低，雾里有人用熟人的声音叫门，雾灯却还没有真正亮起。
  buildingIds:
    - building_lamp_room
  interactionIds:
    - interaction_morning_mirror
    - interaction_noon_shadow
    - interaction_night_wick
