- id: ending_fog_lamp_departure
  name: 雾灯开路
  priority: 100
  conditions:
    fact: facts.fog_lamp_rite_completed
    equals: true
  summary: 雾灯被重新点亮，白雾向路两侧退开。守灯人没有送你，只在灯室门口提醒你离开后不要回头数自己的脚步。
  causalChainRules:
    - fact: guide_briefed
      text: 你先听完守灯人的规则，没有把驿站当成普通歇脚处。
    - fact: ritual_night_done
      text: 你在第一夜前拿到了晨镜盐、正午影线和夜灰灯芯。
    - fact: lamp_materials_delivered
      text: 第一夜里，你把三件封灯物按时交给沈灯。
    - fact: lamp_lit
      text: 第二天沈灯开启雾灯，驿站承认你仍是过路人。
    - variable: lamp_readiness
      operator: greater_than_or_equal
      value: 80
      text: 雾灯整备已足以压住路外白雾。
- id: ending_new_lamp_keeper
  name: 雾中守灯
  priority: 90
  conditions:
    fact: facts.player_became_keeper
    equals: true
  summary: 你没有在第一夜把三件封灯物交给沈灯。雾把守灯人的名字从木牌上抹去，又把你的名字刻了上去。此后你站在无垠雾中，等待下一个敲门的人。
  causalChainRules:
    - fact: guide_briefed
      text: 你知道规则，却没能在第一天夜里完成交付。
    - fact: shen_plan_succeeded
      text: 沈灯借你的失约摆脱了守灯人的位置。
    - variable: fog_pressure
      operator: greater_than_or_equal
      value: 20
      text: 雾压没有被雾灯完全压回路外。
- id: ending_lost_before_rules
  name: 未听规则
  priority: 90
  conditions:
    all:
      - fact: time.day
        greater_than_or_equal: 2
      - fact: facts.guide_briefed
        exists: false
  summary: 你没有问清守灯人的规则。第二天雾色翻上台阶，驿站再也分不清你是客人，还是早该留下的人。
  causalChainRules:
    - variable: rule_integrity
      operator: less_than
      value: 40
      text: 规则从一开始就没有被完整建立。
