- id: reward_rite_prepared
  name: 封灯物齐备
  description: 三件封灯物已经在第一天夜里交给沈灯。
  effects:
    - type: add_fact
      key: rite_prepared
      value: true
    - type: start_quest
      questId: quest_light_fog_lamp
    - type: change_variable
      key: rule_integrity
      delta: 10
- id: reward_station_left
  name: 雾灯点亮
  description: 雾灯重新划开道路，驿站承认你仍是过路人。
  effects:
    - type: add_fact
      key: fog_lamp_rite_completed
      value: true
    - type: change_variable
      key: fog_pressure
      delta: -20
    - type: trigger_ending
      endingId: ending_fog_lamp_departure
