- id: interaction_morning_mirror
  name: 背灯擦镜
  description: 按守灯人的第一条规则，用背面对着雾灯擦净铜镜，不看镜中多出来的脸。
  type: environment
  environmentType: search
  targetType: building
  targetId: building_lamp_room
  cost:
    actionPoints: 1
    stamina: 6
  conditions:
    all:
      - fact: facts.guide_briefed
        equals: true
      - fact: facts.ritual_morning_done
        exists: false
  effects:
    - type: add_item
      itemId: item_mirror_salt
      count: 1
    - type: add_fact
      key: ritual_morning_done
      value: true
    - type: change_variable
      key: lamp_readiness
      delta: 25
    - type: change_variable
      key: rule_integrity
      delta: 15
- id: interaction_noon_shadow
  name: 灯架定影
  description: 量出灯架的第十三根影线，把它缠到封灯匣的铜扣上。
  type: environment
  environmentType: search
  targetType: building
  targetId: building_lamp_room
  cost:
    actionPoints: 1
    stamina: 6
  conditions:
    all:
      - fact: facts.guide_briefed
        equals: true
      - fact: facts.ritual_noon_done
        exists: false
  effects:
    - type: add_item
      itemId: item_shadow_thread
      count: 1
    - type: add_fact
      key: ritual_noon_done
      value: true
    - type: change_variable
      key: lamp_readiness
      delta: 25
    - type: change_variable
      key: fog_pressure
      delta: -10
- id: interaction_night_wick
  name: 灰里封芯
  description: 雾中有人呼唤你的名字时不要应声，只从旧灯芯灰里拈出还能发冷的那一缕。
  type: environment
  environmentType: search
  targetType: building
  targetId: building_lamp_room
  cost:
    actionPoints: 1
    stamina: 8
  conditions:
    all:
      - fact: facts.guide_briefed
        equals: true
      - fact: facts.ritual_night_done
        exists: false
  effects:
    - type: add_item
      itemId: item_ashen_wick
      count: 1
    - type: add_item
      itemId: item_sealed_lamp_box
      count: 1
    - type: add_fact
      key: ritual_night_done
      value: true
    - type: add_fact
      key: sealed_lamp_box_ready
      value: true
    - type: change_variable
      key: lamp_readiness
      delta: 30
    - type: change_variable
      key: rule_integrity
      delta: 20
- id: interaction_light_fog_lamp
  name: 点亮雾灯
  description: 在守灯人的注视下把封过的夜灰灯芯压入灯盏，直到雾里所有多余的脚步声同时停下。
  type: environment
  environmentType: search
  targetType: building
  targetId: building_lamp_room
  cost:
    actionPoints: 1
    stamina: 10
  conditions:
    all:
      - fact: time.day
        equals: 2
      - fact: quests.quest_deliver_lamp_box.status
        equals: completed
      - fact: facts.lamp_lit
        exists: false
  effects:
    - type: add_fact
      key: lamp_lit
      value: true
    - type: add_fact
      key: station_left
      value: true
    - type: change_variable
      key: lamp_readiness
      delta: 20
    - type: change_variable
      key: fog_pressure
      delta: -35
