packId: demo_crossroads
version: 0.2.0
schemaVersion: 1.1.0
id: world_demo_crossroads
name: 雾灯驿站
summary: 你是一名抵达旧路驿站的过路人，却发现雾灯未能亮起，四周大雾弥漫，已经无法分清来路与去向。必须想办法点亮雾灯，才能离开这里。
editorBackground: 雾灯驿站是一处被无垠白雾包围的旧路驿站。雾不是天气，而是一种会模仿脚步、声音和记忆的异质存在；驿站的雾灯并非普通灯火，而是用三段日课维持边界的封印。玩家开局抵达驿站，先与守灯人取得规则和任务；第一天早晨、正午、夜晚必须分别完成擦镜、定影、封芯三项指定动作，取得封灯匣。第二天再次与守灯人交付封灯匣后，才可以点亮雾灯并离开。如果玩家错过规则、未完成交付，或拖到第二天夜里仍未点灯，雾会抹去原守灯人的位置，让玩家成为新的守灯人，在无垠雾中等待下一个抵达者。
maxDays: 2
segments:
  - morning
  - noon
  - night
actionPointsPerSegment: 2
